version: '3.8'

services:
  # Layanan Aplikasi (Laravel/PHP)
  app:
    build:
      context: ./Backend-Laravel
      dockerfile: Dockerfile
    container_name: hima-laravel-app
    working_dir: /var/www/html
    volumes:
      - ./Backend-Laravel:/var/www/html
    networks:
      - hima-network

  # Layanan Web Server (Nginx)
  nginx:
    image: nginx:alpine
    container_name: hima-nginx
    ports:
      - "8080:80" # Akses backend dari browser via port 8080
    volumes:
      - ./Backend-Laravel:/var/www/html
      - ./Backend-Laravel/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - hima-network

  # Layanan Database (MySQL)
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password #
    container_name: hima-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      # MYSQL_USER: ${DB_USERNAME}
      # MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - hima-db-data:/var/lib/mysql
    ports:
      - "33061:3306" # Akses DB dari luar (opsional) via port 33061
    networks:
      - hima-network

  # Layanan Frontend (React)
  frontend:
    build:
      context: ./Frontend-React
      dockerfile: Dockerfile
    container_name: hima-react-frontend
    volumes:
      - ./Frontend-React:/app
      - /app/node_modules
    ports:
      - "3000:3000" # Akses frontend dari browser via port 3000
    networks:
      - hima-network

networks:
  hima-network:
    driver: bridge

volumes:
  hima-db-data:
    driver: local